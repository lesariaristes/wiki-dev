title: Wiki dev — Les Ariaristes
description: Documentation technique

remote_theme: just-the-docs/just-the-docs

search_enabled: true
color_scheme: dark

footer_content: |
  <span id="last-modified-page">Dernière modification : chargement…</span>
  <script>
    (function () {
      const repo = "lesariaristes/wiki-dev";
      const branch = "main";
      const target = document.getElementById("last-modified-page");

      function pageCandidates() {
        let path = decodeURIComponent(window.location.pathname || "/");
        path = path.replace(/\/+$/, "");
        path = path.replace(/^\/+/, "");

        if (path === "") {
          return ["docs/index.md"];
        }

        // Le site expose les pages sous /docs/ mais les sources Markdown sont déjà dans le dossier docs/.
        // Exemple : /docs/game-design-ligne-directrice/ -> docs/game-design-ligne-directrice.md
        if (path === "docs") {
          return ["docs/index.md"];
        }

        if (path.startsWith("docs/")) {
          path = path.substring("docs/".length);
        }

        return [
          `docs/${path}.md`,
          `docs/${path}/index.md`
        ];
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("fr-FR", {
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Europe/Paris"
        }).format(new Date(value));
      }

      async function getLatestCommit(path) {
        const url = `https://api.github.com/repos/${repo}/commits?sha=${branch}&path=${encodeURIComponent(path)}&per_page=1`;
        const response = await fetch(url, {
          headers: { Accept: "application/vnd.github+json" }
        });

        if (!response.ok) {
          return null;
        }

        const commits = await response.json();
        return commits && commits.length ? commits[0] : null;
      }

      async function render() {
        if (!target) {
          return;
        }

        for (const path of pageCandidates()) {
          const commit = await getLatestCommit(path);

          if (!commit) {
            continue;
          }

          const date = commit.commit?.committer?.date || commit.commit?.author?.date;
          const committer = commit.committer?.login || commit.commit?.committer?.name || commit.author?.login || commit.commit?.author?.name || "inconnu";

          if (date) {
            target.textContent = `Dernière modification le ${formatDate(date)} par ${committer}`;
            return;
          }
        }

        target.textContent = "Dernière modification indisponible";
      }

      render().catch(function () {
        if (target) {
          target.textContent = "Dernière modification indisponible";
        }
      });
    })();
  </script>

aux_links:
  "Repository GitHub":
